apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: POSTGRES_USER
          command:
            - sh
            - -ec
            - until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do echo waiting for postgres; sleep 3; done
        - name: wait-redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plm-cloud-secret
                  key: REDIS_PASSWORD
          command:
            - sh
            - -ec
            - until redis-cli -h redis -p 6379 -a "$REDIS_PASSWORD" ping | grep PONG; do echo waiting for redis; sleep 3; done
        - name: wait-migration
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: plm-cloud-secret
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -ec
            - |
              until [ "$(psql -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "SELECT 1 FROM information_schema.tables WHERE table_name='flyway_schema_history' LIMIT 1")" = "1" ]; do
                echo waiting for flyway history
                sleep 3
              done
      containers:
        - name: auth-service
          image: ghcr.io/altair288/plm-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          resources:
            requests:
              cpu: 1000m
              memory: 2048Mi
            limits:
              cpu: 2000m
              memory: 2048Mi
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: SPRING_PROFILES_ACTIVE
            - name: PLM_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_DATASOURCE_URL
            - name: PLM_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_DATASOURCE_USERNAME
            - name: PLM_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plm-cloud-secret
                  key: POSTGRES_PASSWORD
            - name: PLM_DATASOURCE_DRIVER_CLASS_NAME
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_DATASOURCE_DRIVER_CLASS_NAME
            - name: PLM_AUTH_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_REDIS_HOST
            - name: PLM_AUTH_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_REDIS_PORT
            - name: PLM_AUTH_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plm-cloud-secret
                  key: REDIS_PASSWORD
            - name: PLM_AUTH_REDIS_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_REDIS_DATABASE
            - name: PLM_AUTH_PLATFORM_ADMIN_BOOTSTRAP_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_PLATFORM_ADMIN_BOOTSTRAP_ENABLED
            - name: PLM_AUTH_PLATFORM_ADMIN_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_PLATFORM_ADMIN_USERNAME
            - name: PLM_AUTH_PLATFORM_ADMIN_DISPLAY_NAME
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_PLATFORM_ADMIN_DISPLAY_NAME
            - name: PLM_AUTH_PLATFORM_ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_PLATFORM_ADMIN_EMAIL
            - name: PLM_AUTH_PLATFORM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plm-cloud-secret
                  key: PLM_AUTH_PLATFORM_ADMIN_PASSWORD
            - name: PLM_AUTH_PLATFORM_ADMIN_ROLE_CODE
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_PLATFORM_ADMIN_ROLE_CODE
            - name: PLM_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_PUBLIC_BASE_URL
            - name: PLM_AUTH_INVITATION_EMAIL_ACCEPT_URL_TEMPLATE
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_INVITATION_EMAIL_ACCEPT_URL_TEMPLATE
            - name: PLM_AUTH_INVITATION_LINK_ACCEPT_URL_TEMPLATE
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_INVITATION_LINK_ACCEPT_URL_TEMPLATE
            - name: PLM_AUTH_RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: plm-cloud-secret
                  key: PLM_AUTH_RESEND_API_KEY
            - name: PLM_AUTH_RESEND_FROM_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_RESEND_FROM_EMAIL
            - name: PLM_AUTH_RESEND_FROM_NAME
              valueFrom:
                configMapKeyRef:
                  name: plm-cloud-config
                  key: PLM_AUTH_RESEND_FROM_NAME
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
---
